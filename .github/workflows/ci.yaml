name: CI

on:
  pull_request:
  push:
    branches:
      - 'master'
    tags:
      - '**'

jobs:
  build:
    uses: Workiva/gha-dart-oss/.github/workflows/build.yaml@v2.10.32
    with:
      sdk: stable

  checks:
    uses: Workiva/gha-dart-oss/.github/workflows/checks.yaml@v2.10.32
    with:
      sdk: stable

  test-unit:
    strategy:
      matrix:
        sdk: [ stable ]
    uses: Workiva/gha-dart-oss/.github/workflows/test-unit.yaml@v2.10.32
    with:
      sdk: ${{ matrix.sdk }}
